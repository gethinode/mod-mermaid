icon: schema
example: |
  {{< mermaid >}}
  graph TD
    A[Start] --> B{Decision}
    B -->|Yes| C[Action]
    B -->|No| D[End]
  {{< /mermaid >}}
comment: >-
  Renders a Mermaid diagram with optional controls.
arguments:
  page:
    optional: false
    group: partial
  raw:
    optional: false
    group: partial
  controls:
    release: v1.7.0
  fullscreen:
    type: bool
    default: false
    optional: true
    comment: >-
      Flag indicating if the diagram should include a fullscreen control that
      opens it in the lightbox overlay.
    release: v4.7.0
  align:
    comment: >-
      Horizontal alignment of the rendered diagram. Only `center` and `end`
      shift the diagram; `start` keeps the diagram's default flow.
    release: v2.12.0
body:
  optional: false
  comment: >-
    Mermaid diagram content.
  group: shortcode
