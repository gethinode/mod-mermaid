icon: schema
example: |
  {{< mermaid >}}
  graph TD
    A[Start] --> B{Decision}
    B -->|Yes| C[Action]
    B -->|No| D[End]
  {{< /mermaid >}}
comment: >-
  Renders a Mermaid diagram with optional controls.
arguments:
  page:
    optional: false
    group: partial
  raw:
    optional: false
    group: partial
  controls:
    release: v1.7.0
  fullscreen:
    type: string
    default: false
    config: modules.mermaid.fullscreen
    optional: true
    options:
      values:
        - "true"
        - "false"
        - "auto"
    comment: >-
      Controls the fullscreen affordance. "true"/"false" force it on/off;
      "auto" enables it only for diagrams whose source exceeds
      `modules.mermaid.autoThreshold` significant lines. When unset, falls back
      to the site parameter `modules.mermaid.fullscreen`, then to false.
    release: v4.6.0
  align:
    comment: >-
      Horizontal alignment of the rendered diagram. Only `center` and `end`
      shift the diagram; `start` keeps the diagram's default flow.
    release: v2.12.0
body:
  optional: false
  comment: >-
    Mermaid diagram content.
  group: shortcode
