[module]
  [module.hugoVersion]
    extended = true
    min = "0.146.0"
    max = ""
  [[module.mounts]]
    source = "dist/mermaid.esm.min.mjs"
    target = "static/js/mermaid/mermaid.esm.min.mjs"
  [[module.mounts]]
    source = "dist/chunks/mermaid.esm.min"
    target = "static/js/mermaid/chunks/mermaid.esm.min"
  [[module.mounts]]
    source = "dist/layout-elk"
    target = "static/js/mermaid-layout-elk"
  [[module.mounts]]
    source = 'assets'
    target = 'assets'
  [[module.mounts]]
    source = 'data'
    target = 'data'
  [[module.mounts]]
    source = 'layouts'
    target = 'layouts'
  [[module.mounts]]
    source = 'static'
    target = 'static'
  [[module.imports]]
    path = "github.com/gethinode/mod-fontawesome/v5"
  [[module.imports]]
    path = "github.com/gethinode/mod-utils/v5"

# Icon defaults for mod-mermaid components
[params.icons]
  diagramExpand   = "fas expand"
  diagramZoomOut  = "fas magnifying-glass-minus"
  diagramZoomIn   = "fas magnifying-glass-plus"
